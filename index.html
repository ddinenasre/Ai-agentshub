        .text-gradient {
            background: linear-gradient(135deg, #00f0ff, #b829dd, #ff2d95);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 8s ease infinite;
        }

        .text-gradient-blue {
            background: linear-gradient(135deg, #00f0ff, #2979ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .mesh-gradient {
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0,240,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(184,41,221,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255,45,149,0.05) 0%, transparent 60%);
        }

        .typing-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #00f0ff;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        .code-block {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,240,255,0.1);
            border-radius: 12px;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .agent-card-selected {
            border-color: rgba(0,240,255,0.5) !important;
            box-shadow: 0 0 30px rgba(0,240,255,0.15), inset 0 0 30px rgba(0,240,255,0.05) !important;
        }

        .model-selected {
            border-color: rgba(184,41,221,0.5) !important;
            background: rgba(184,41,221,0.08) !important;
        }

        #three-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .message-enter {
            animation: messageEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes messageEnter {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes scaleIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes typeCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }

        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        const { useState, useEffect, useRef } = React;

        // ==================== THREE.JS BACKGROUND ====================
        const initThreeBackground = () => {
            const canvas = document.getElementById('three-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 800;
            const posArray = new Float32Array(particlesCount * 3);
            const colorArray = new Float32Array(particlesCount * 3);

            for(let i = 0; i < particlesCount * 3; i += 3) {
                posArray[i] = (Math.random() - 0.5) * 20;
                posArray[i+1] = (Math.random() - 0.5) * 20;
                posArray[i+2] = (Math.random() - 0.5) * 20;

                const colorChoice = Math.random();
                if(colorChoice < 0.33) {
                    colorArray[i] = 0; colorArray[i+1] = 0.94; colorArray[i+2] = 1;
                } else if(colorChoice < 0.66) {
                    colorArray[i] = 0.72; colorArray[i+1] = 0.16; colorArray[i+2] = 0.87;
                } else {
                    colorArray[i] = 1; colorArray[i+1] = 0.18; colorArray[i+2] = 0.58;
                }
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.03,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
            });

            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            const spheres = [];
            const sphereColors = [0x00f0ff, 0xb829dd, 0xff2d95];
            for(let i = 0; i < 3; i++) {
                const geometry = new THREE.SphereGeometry(0.5 + Math.random() * 0.5, 32, 32);
                const material = new THREE.MeshBasicMaterial({
                    color: sphereColors[i],
                    transparent: true,
                    opacity: 0.08,
                });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.set(
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10
                );
                sphere.userData = {
                    speed: 0.002 + Math.random() * 0.003,
                    radius: 2 + Math.random() * 3,
                    offset: Math.random() * Math.PI * 2
                };
                scene.add(sphere);
                spheres.push(sphere);
            }

            camera.position.z = 5;

            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
                mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
            });

            const animate = () => {
                requestAnimationFrame(animate);
                particlesMesh.rotation.x += 0.0003;
                particlesMesh.rotation.y += 0.0005;

                const time = Date.now() * 0.001;
                spheres.forEach((sphere) => {
                    sphere.position.x = Math.sin(time * sphere.userData.speed + sphere.userData.offset) * sphere.userData.radius;
                    sphere.position.y = Math.cos(time * sphere.userData.speed * 0.7 + sphere.userData.offset) * sphere.userData.radius * 0.5;
                    sphere.position.z = Math.sin(time * sphere.userData.speed * 0.5 + sphere.userData.offset) * 2;
                });

                camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.05;
                camera.position.y += (-mouseY * 0.5 - camera.position.y) * 0.05;
                camera.lookAt(scene.position);

                renderer.render(scene, camera);
            };
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };

            if (!text) return '';
            let formatted = text
                .replace(/```([\s\S]*?)```/g, '<div class="code-block"><pre><code>$1</code></pre></div>')
                .replace(/`([^`]+)`/g, '<code style="background:rgba(0,240,255,0.1);padding:2px 6px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:0.85em;color:#00f0ff;">$1</code>')

                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
            return formatted;

        const AgentCard = ({ agent, isSelected, onClick, index }) => {

                        isSelected

                    <div className="relative z-10">

                            <div className="w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg transition-transform group-hover:scale-110"

                                <i className={`fas ${agent.icon} text-white text-xl`}></i>

                            {isSelected && (

                        <h3 className="font-display font-bold text-xl mb-1">{agent.name}</h3>

                        <div className="flex flex-wrap gap-2">

        const MessageBubble = ({ message, isUser }) => {
            return (
                <div className={`flex ${isUser ? 'justify-start' : 'justify-end'} message-enter`}>
                    <div className={`max-w-[85%] md:max-w-[75%] ${isUser ? 'order-1' : 'order-2'}`}>
                        <div className={`rounded-2xl px-5 py-4 ${

                                ? 'bg-gradient-to-br from-[#00f0ff]/20 to-[#2979ff]/10 border border-[#00f0ff]/20'

                    <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mx-3 ${

                            ? 'bg-gradient-to-br from-[#00f0ff] to-[#2979ff] order-2' 
                            : 'bg-gradient-to-br from-[#b829dd] to-[#ff2d95] order-1'

                        <i className={`fas ${isUser ? 'fa-user' : 'fa-robot'} text-white text-xs`}></i>
                    </div>

        const ChatInterface = ({ selectedAgent, selectedModel, apiKey, onApiRequired }) => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [streamingContent, setStreamingContent] = useState('');
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, streamingContent]);

            const sendMessage = async (text = input) => {
                if (!text.trim() || isLoading) return;
                if (!apiKey) {
                    onApiRequired();
                    return;
                }

                const userMsg = { id: generateId(), role: 'user', content: text, time: Date.now() };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setIsLoading(true);
                setStreamingContent('');

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json',
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'AI Agents Hub'
                        },
                        body: JSON.stringify({
                            model: selectedModel,
                            messages: [
                                { role: 'system', content: selectedAgent.system },
                                ...messages.slice(-8).map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content })),
                                { role: 'user', content: text }
                            ],
                            stream: true
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullContent = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');

                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.slice(6);
                                if (data === '[DONE]') continue;
                                try {
                                    const parsed = JSON.parse(data);
                                    const content = parsed.choices?.[0]?.delta?.content || '';
                                    if (content) {
                                        fullContent += content;
                                        setStreamingContent(fullContent);
                                    }
                                } catch (e) {}
                            }
                        }
                    }

                    setMessages(prev => [...prev, { id: generateId(), role: 'bot', content: fullContent, time: Date.now() }]);
                    setStreamingContent('');

                } catch (error) {
                    setMessages(prev => [...prev, { 
                        id: generateId(),
                        role: 'bot', 
                        content: '❌ عذراً، حدث خطأ في الاتصال.\n\n**الحلول المقترحة:**\n1. تحقق من صحة مفتاح API\n2. تأكد من اتصالك بالإنترنت\n3. جرب نموذجاً آخر\n4. انتظر قليلاً ثم أعد المحاولة', 
                        time: Date.now() 
                    }]);
                } finally {
                    setIsLoading(false);
                }
            };

            const clearChat = () => {
                if (confirm('هل تريد مسح المحادثة؟')) {
                    setMessages([]);
                    setStreamingContent('');
                }
            };

            const exportChat = () => {
                const text = messages.map(m => `${m.role === 'user' ? '👤 أنت' : '🤖 البوت'}:\n${m.content}\n\n${'='.repeat(50)}\n`).join('\n');
                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `chat-${new Date().toISOString().slice(0,10)}.txt`;
                a.click();
            };

            return (
                <div className="glass-strong rounded-3xl overflow-hidden flex flex-col h-[650px]" id="chat">
                    <div className="px-6 py-4 border-b border-[rgba(255,255,255,0.06)] flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg"
                                 style={{background: `linear-gradient(135deg, ${selectedAgent.color}, ${selectedAgent.color}88)`}}>
                                <i className={`fas ${selectedAgent.icon} text-white text-lg`}></i>
                            </div>
                            <div>
                                <h3 className="font-display font-bold text-lg">{selectedAgent.name}</h3>
                                <div className="flex items-center gap-2 text-xs text-[#4a4a5e]">
                                    <span className="w-2 h-2 rounded-full bg-[#00e676] animate-pulse"></span>
                                    <span>متصل الآن</span>
                                    <span className="mx-1">•</span>
                                    <span className="font-mono">{selectedModel.split('/')[1]?.split(':')[0] || selectedModel}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={clearChat} className="p-2.5 rounded-xl hover:bg-[#12121f] transition-colors text-[#4a4a5e] hover:text-[#ff2d95]" title="مسح المحادثة">
                                <i className="fas fa-trash-alt"></i>
                            </button>
                            <button onClick={exportChat} className="p-2.5 rounded-xl hover:bg-[#12121f] transition-colors text-[#4a4a5e] hover:text-[#00f0ff]" title="تصدير المحادثة">
                                <i className="fas fa-download"></i>
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 space-y-6">
                        {messages.length === 0 && !isLoading && (
                            <div className="h-full flex flex-col items-center justify-center text-center animate-fade-in">
                                <div className="w-24 h-24 rounded-3xl flex items-center justify-center mb-6 animate-float"
                                     style={{background: 'linear-gradient(135deg, rgba(0,240,255,0.2), rgba(184,41,221,0.2))'}}>
                                    <i className="fas fa-comments text-[#00f0ff] text-4xl"></i>
                                </div>
                                <h3 className="font-display font-bold text-2xl mb-2">ابدأ محادثتك الآن</h3>
                                <p className="text-[#8b8b9e] mb-8 max-w-md">اختر وكيلاً من الأعلى وابدأ في الكتابة، أو اختر أحد الاقتراحات السريعة أدناه</p>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-lg w-full">
                                    {QUICK_PROMPTS.map((prompt, i) => (
                                        <button 
                                            key={i}

                                            className="p-4 rounded-xl glass text-right hover:border-[#00f0ff]/30 transition-all group text-sm"
                                        >
                                            <span className="text-lg mr-2">{prompt.icon}</span>
                                            <span className="text-[#8b8b9e] group-hover:text-[#f0f0f5] transition-colors">{prompt.text}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {messages.map((msg) => (
                            <MessageBubble key={msg.id} message={msg} isUser={msg.role === 'user'} />

                        {streamingContent && (
                            <MessageBubble message={{ content: streamingContent, time: Date.now() }} isUser={false} />

                        {isLoading && !streamingContent && (

                                    <div className="typing-dot"></div>
                                    <div className="typing-dot"></div>
                                    <div className="typing-dot"></div>
                                </div>
                            </div>
                        )}

                        <div ref={messagesEndRef} />
                    </div>

                    <div className="px-6 py-4 border-t border-[rgba(255,255,255,0.06)]">
                        <div className="flex items-end gap-3">
                            <div className="flex-1 relative">
                                <textarea
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            sendMessage();
                                        }
                                    }}
                                    placeholder="اكتب رسالتك هنا... اضغط Enter للإرسال، Shift+Enter للسطر الجديد"

                                    <i className="fas fa-times"></i>

                            </div>
                            <button

                                    <div className="w-5 h-5 border-2 border-[#030308]/30 border-t-[#030308] rounded-full animate-spin"></div>

                                    <i className="fas fa-paper-plane text-lg"></i>

                            </button>
                        </div>
                        <div className="flex items-center justify-between mt-3 text-xs text-[#4a4a5e]">
                            <div className="flex items-center gap-4">
                                <span><i className="fas fa-shield-alt mr-1"></i> مشفر وآمن</span>
                                <span><i className="fas fa-bolt mr-1"></i> ردود فورية</span>
                            </div>
                            <span>{messages.length} رسالة</span>
                        </div>
                    </div>
                </div>
            );
        };

        const ModelCard = ({ model, isSelected, onClick }) => {

                            />

                                إلغاء

        const Footer = () => (
            <footer className="border-t border-[rgba(255,255,255,0.06)] py-12 px-6">
                <div className="max-w-7xl mx-auto">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                        <div>
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-[#00f0ff] to-[#b829dd] flex items-center justify-center">
                                    <i className="fas fa-robot text-white"></i>
                                </div>
                                <div>
                                    <h3 className="font-display font-bold">AI Agents Hub</h3>
                                    <p className="text-[#4a4a5e] text-xs">مركز الوكلاء الذكيين</p>
                                </div>
                            </div>
                            <p className="text-[#8b8b9e] text-sm leading-relaxed">
                                منصة متكاملة للوكلاء الذكيين مبنية بأحدث التقنيات. مجانية ومفتوحة المصدر بالكامل.
                            </p>
                        </div>
                        <div>
                            <h4 className="font-display font-bold mb-4">روابط سريعة</h4>
                            <div className="space-y-2">
                                {['الوكلاء', 'المحادثة', 'النماذج', 'GitHub'].map(link => (
                                    <a key={link} href="#" className="block text-[#8b8b9e] hover:text-[#00f0ff] transition-colors text-sm">{link}</a>
                                ))}
                            </div>
                        </div>
                        <div>
                            <h4 className="font-display font-bold mb-4">التقنيات المستخدمة</h4>
                            <div className="flex flex-wrap gap-2">
                                {['React', 'Three.js', 'Tailwind CSS', 'OpenRouter', 'GitHub Pages'].map(tech => (

                        <p className="mt-2 text-xs">جميع النماذج المجانية متاحة عبر <a href="https://openrouter.ai" target="_blank" className="text-[#00f0ff] hover:underline">OpenRouter</a></p>

            const [selectedModel, setSelectedModel] = useState(MODELS[0]);

                                            </div>
                                            <div className="space-y-3">
                                                {MODELS.map(model => (
                                                    <ModelCard
                                                        key={model.id}
                                                        model={model}
                                                        isSelected={selectedModel.id === model.id}
                                                        onClick={() => setSelectedModel(model)}
                                                    />
                                                ))}
                                            </div>
                                        </div>

                                        <div className="glass rounded-3xl p-6">
                                            <h3 className="font-display font-bold mb-4 flex items-center gap-2">
                                                <i className="fas fa-info-circle text-[#00f0ff]"></i>
                                                معلومات
                                            </h3>
                                            <div className="space-y-4">
                                                <div className="flex items-center justify-between text-sm">
                                                    <span className="text-[#8b8b9e]">الوكيل الحالي</span>
                                                    <span className="font-medium">{selectedAgent.name}</span>
                                                </div>
                                                <div className="flex items-center justify-between text-sm">
                                                    <span className="text-[#8b8b9e]">النموذج</span>
                                                    <span className="font-medium font-mono text-xs">{selectedModel.name}</span>
                                                </div>
                                                <div className="flex items-center justify-between text-sm">
                                                    <span className="text-[#8b8b9e]">حالة API</span>
                                                    <span className={`flex items-center gap-1.5 ${apiKey ? 'text-[#00e676]' : 'text-[#ff2d95]'}`}>
                                                        <span className="w-2 h-2 rounded-full bg-current animate-pulse"></span>
                                                        {apiKey ? 'متصل' : 'غير متصل'}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="glass rounded-3xl p-6">
                                            <h3 className="font-display font-bold mb-4">المميزات</h3>
                                            <div className="space-y-3">
                                                {[
                                                    { icon: 'fa-bolt', text: 'ردود فورية بتدفق مباشر' },
                                                    { icon: 'fa-shield-alt', text: 'تشفير كامل للبيانات' },
                                                    { icon: 'fa-infinity', text: 'محادثات غير محدودة' },
                                                    { icon: 'fa-download', text: 'تصدير المحادثات' },
                                                    { icon: 'fa-moon', text: 'وضع داكن احترافي' },
                                                    { icon: 'fa-mobile-alt', text: 'تصميم متجاوب' },
                                                ].map((feat, i) => (
                                                    <div key={i} className="flex items-center gap-3 text-sm text-[#8b8b9e]">
                                                        <i className={`fas ${feat.icon} text-[#00f0ff] w-5`}></i>
                                                        {feat.text}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <Footer />
                    </div>

                    <ApiKeyModal
                        isOpen={showApiModal}
                        onClose={() => setShowApiModal(false)}
                        onSave={handleSaveApiKey}
                        currentKey={apiKey}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
